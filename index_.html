<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Табачный шкаф — игра</title>
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css"
    />
    <style>
      :root {
        --bg: #f6fbf7;
        --panel: #ffffff;
        --green: #1f8f52;
        --green-2: #2dae68;
        --dark: #272b31;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: #202020;
      }
      .wrap { max-width: 1280px; margin: 0 auto; padding: 16px; }
      .top {
        background: var(--panel);
        border: 1px solid #e8efe9;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 14px;
      }
      h1 { margin: 0 0 10px; color: #0e6a3b; font-size: 24px; }
      .stats { display: flex; flex-wrap: wrap; gap: 12px; font-weight: 700; }
      .controls { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
      button {
        border: 0; border-radius: 8px; background: var(--green); color: #fff;
        padding: 9px 12px; cursor: pointer; font-weight: 700;
      }
      button:hover { background: var(--green-2); }
      .note {
        margin-top: 8px; padding: 8px 10px; border-radius: 8px;
        border: 1px solid #cbeed8; background: #edfbf2;
      }
      .game {
        display: grid; gap: 14px; grid-template-columns: 1fr 1fr;
      }
      .card {
        background: var(--panel);
        border: 1px solid #e8efe9;
        border-radius: 12px;
        padding: 12px;
      }
      .card h2 { margin: 0 0 10px; }
      .shelf {
        border-radius: 14px;
        border: 4px solid #1f2125;
        background: linear-gradient(180deg, #4b5058 0%, #2a2f34 100%);
        padding: 10px;
        display: grid;
        gap: 8px;
      }
      .row {
        display: grid;
        grid-template-columns: repeat(10, minmax(0, 1fr));
        gap: 6px;
        border-radius: 10px;
        padding: 6px;
        background: linear-gradient(180deg, #373d45 0%, #252a31 100%);
        min-height: 72px;
      }
      .slot {
        min-height: 58px;
        border-radius: 8px;
        border: 2px dashed #b7bec6;
        background: #fdfefe;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3px;
      }
      .slot.ok { border-color: #4fb97a; background: #ebfbf1; }
      .pack {
        width: 100%;
        min-height: 50px;
        border-radius: 7px;
        border: 2px solid rgba(255,255,255,.35);
        background: #111;
        color: #fff;
        font-size: 11px;
        display: block;
        overflow: hidden;
        cursor: grab;
      }
      .pack img { width: 100%; height: 100%; min-height: 50px; object-fit: cover; display: block; }
      .basket {
        margin-top: 12px; text-align: center;
        border: 2px dashed #2ea765; border-radius: 10px;
        background: #eefcf3; padding: 10px;
      }
      .basket.over { background: #d9f8e5; }
      .basket-list {
        margin-top: 8px;
        min-height: 66px;
        border: 1px solid #e5e5e5; border-radius: 10px;
        background: #fafafa;
        display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 6px;
        padding: 6px;
      }
      .coach {
        margin: 12px 0 0;
        display: flex; gap: 10px; align-items: center;
      }
      .mascot {
        position: relative;
        width: 70px;
        height: 78px;
        flex: 0 0 auto;
      }
      .mascot-head {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #ffd6a3;
        border: 2px solid #deae74;
        position: absolute;
        left: 17px;
        top: 0;
        z-index: 2;
      }
      .mascot-body {
        width: 54px;
        height: 42px;
        border-radius: 14px;
        background: linear-gradient(180deg, #58c47d 0%, #2f9858 100%);
        border: 2px solid #237846;
        position: absolute;
        left: 8px;
        bottom: 0;
      }
      .mascot-eye {
        width: 5px;
        height: 5px;
        background: #212121;
        border-radius: 50%;
        position: absolute;
        top: 12px;
      }
      .mascot-eye.left { left: 10px; }
      .mascot-eye.right { right: 10px; }
      .mascot-smile {
        position: absolute;
        width: 13px;
        height: 7px;
        border-bottom: 2px solid #7a4f2f;
        border-radius: 0 0 12px 12px;
        left: 11px;
        top: 20px;
      }
      .mascot-arm {
        position: absolute;
        width: 12px;
        height: 28px;
        background: #58c47d;
        border: 2px solid #237846;
        border-radius: 10px;
        right: 0;
        top: 33px;
        transform-origin: top center;
        animation: wave 1.1s ease-in-out infinite;
      }
      .mascot-badge {
        position: absolute;
        bottom: 10px;
        left: 20px;
        color: #fff;
        font-size: 16px;
      }
      @keyframes wave {
        0% { transform: rotate(22deg); }
        50% { transform: rotate(-12deg); }
        100% { transform: rotate(22deg); }
      }
      .fi { line-height: 0; }
      @keyframes bob { 0%{transform:translateY(0)} 50%{transform:translateY(-4px)} 100%{transform:translateY(0)} }
      .result {
        margin-top: 10px; padding: 10px; border-radius: 8px;
        border: 1px solid #d8e8dd; background: #f7fffa;
      }
      @media (max-width: 1000px) { .game { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="top">
        <h1>Поставь пачки сигарет в правильном порядке</h1>
        <div class="stats">
          <span>Время: <b id="time">0</b> c</span>
          <span>Ошибки: <b id="errors">0</b></span>
          <span>Подсказки: <b id="hints">0</b></span>
          <span>Прогресс: <b id="progress">0%</b></span>
          <span>Счет: <b id="score">100</b></span>
        </div>
        <div class="controls">
          <button id="startBtn">Старт</button>
          <button id="resetBtn">Сброс</button>
          <button id="hintBtn">Подсказка</button>
        </div>
        <div class="coach">
          <div class="mascot" aria-hidden="true">
            <div class="mascot-head">
              <span class="mascot-eye left"></span>
              <span class="mascot-eye right"></span>
              <span class="mascot-smile"></span>
            </div>
            <div class="mascot-body"></div>
            <div class="mascot-arm"></div>
            <div class="mascot-badge"><i class="fi fi-sr-store-alt"></i></div>
          </div>
          
          <div id="coachText" class="note">Перетаскивайте пачки в нужные слоты. Лишние пачки можно сбросить в корзину.</div>
        </div>
      </section>

      <section class="game">
        <article class="card">
          <h2>Эталонная планограмма</h2>
          <div id="refShelf" class="shelf"></div>
        </article>
        <article class="card">
          <h2>Шкаф для исправления</h2>
          <div id="workShelf" class="shelf"></div>
          <div id="basket" class="basket">
            <div style="font-size:24px"><i class="fi fi-sr-shopping-basket"></i></div>
            Корзина для сброса
          </div>
          <div style="margin-top:8px;font-weight:700">В корзине</div>
          <div id="basketList" class="basket-list"></div>
          <div class="result" id="resultText">Нажмите «Старт», чтобы начать.</div>
        </article>
      </section>
    </div>

    <script>
      const PACKS = [
        { id: "tb1", image: "https://source.unsplash.com/220x80/?cigarette-pack&sig=101" },
        { id: "tb2", image: "https://source.unsplash.com/220x80/?cigarette-brand&sig=102" },
        { id: "tb3", image: "https://source.unsplash.com/220x80/?tobacco-packaging&sig=103" },
        { id: "tb4", image: "https://source.unsplash.com/220x80/?smoking-pack&sig=104" },
        { id: "tb5", image: "https://source.unsplash.com/220x80/?cigarette-box&sig=105" },
        { id: "tb6", image: "https://source.unsplash.com/220x80/?packaging-box&sig=106" },
        { id: "tb7", image: "https://source.unsplash.com/220x80/?shop-shelf,packaging&sig=107" },
        { id: "tb8", image: "https://source.unsplash.com/220x80/?retro-cigarettes&sig=108" }
      ];

      function randomizePackImages() {
        const shuffled = PACKS.map((p) => p.image).sort(() => Math.random() - 0.5);
        PACKS.forEach((p, i) => {
          p.image = shuffled[i % shuffled.length];
        });
      }

      const rows = 7;
      const cols = 10;
      const baseRef = [
        ["tb1","tb2","tb3","tb4","tb5","tb6",null,null,null,null],
        ["tb2","tb3","tb4","tb5","tb6","tb1",null,null,null,null],
        ["tb3","tb4","tb5","tb6","tb1","tb2",null,null,null,null],
        ["tb4","tb5","tb6","tb1","tb2","tb3",null,null,null,null],
        [null,null,null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null,null,null]
      ];
      const baseStart = JSON.parse(JSON.stringify(baseRef));
      [ [0,0,0,1], [1,3,1,4], [2,2,2,5], [3,1,3,2] ].forEach(([r1,c1,r2,c2]) => {
        const t = baseStart[r1][c1]; baseStart[r1][c1] = baseStart[r2][c2]; baseStart[r2][c2] = t;
      });

      const refShelf = document.getElementById("refShelf");
      const workShelf = document.getElementById("workShelf");
      const basket = document.getElementById("basket");
      const basketList = document.getElementById("basketList");
      const coachText = document.getElementById("coachText");
      const resultText = document.getElementById("resultText");
      const timeEl = document.getElementById("time");
      const errEl = document.getElementById("errors");
      const hintEl = document.getElementById("hints");
      const progEl = document.getElementById("progress");
      const scoreEl = document.getElementById("score");

      let work = JSON.parse(JSON.stringify(baseStart));
      let trash = [];
      let dragFrom = null;
      let started = false;
      let timer = null;
      let sec = 0;
      let errs = 0;
      let hints = 0;

      function packById(id){ return PACKS.find(p => p.id === id) || null; }

      function renderPack(id, r, c, fromTrash = false, trashIndex = -1) {
        if (!id) return null;
        const p = packById(id);
        if (!p) return null;
        const d = document.createElement("div");
        d.className = "pack";
        d.draggable = true;
        d.dataset.row = String(r);
        d.dataset.col = String(c);
        d.dataset.trash = fromTrash ? "1" : "0";
        d.dataset.ti = String(trashIndex);
        d.innerHTML = `<img src="${p.image}" alt="" />`;
        d.addEventListener("dragstart", () => {
          if (!started) return;
          dragFrom = fromTrash ? { trashIndex } : { row: r, col: c };
        });
        return d;
      }

      function renderShelf(container, matrix, interactive) {
        container.innerHTML = "";
        for (let r = 0; r < rows; r++) {
          const row = document.createElement("div");
          row.className = "row";
          for (let c = 0; c < cols; c++) {
            const slot = document.createElement("div");
            slot.className = "slot";
            const id = matrix[r][c];
            if (id && id === baseRef[r][c]) slot.classList.add("ok");
            if (interactive) {
              slot.dataset.row = String(r);
              slot.dataset.col = String(c);
              slot.addEventListener("dragover", (e) => e.preventDefault());
              slot.addEventListener("drop", onDropToSlot);
            }
            const pack = renderPack(id, r, c, false, -1);
            if (pack) slot.appendChild(pack);
            row.appendChild(slot);
          }
          container.appendChild(row);
        }
      }

      function renderBasket() {
        basketList.innerHTML = "";
        trash.forEach((id, i) => {
          const cell = document.createElement("div");
          cell.className = "slot";
          cell.addEventListener("dragover", (e) => e.preventDefault());
          cell.addEventListener("drop", (e) => {
            e.preventDefault();
            if (!started || !dragFrom || dragFrom.trashIndex !== undefined) return;
            const item = work[dragFrom.row][dragFrom.col];
            work[dragFrom.row][dragFrom.col] = null;
            const temp = trash[i];
            trash[i] = item;
            if (temp) work[dragFrom.row][dragFrom.col] = temp;
            dragFrom = null;
            errs++;
            repaint();
          });
          const p = renderPack(id, 0, 0, true, i);
          if (p) cell.appendChild(p);
          basketList.appendChild(cell);
        });
      }

      function onDropToSlot(e) {
        e.preventDefault();
        if (!started || !dragFrom) return;
        const r = Number(e.currentTarget.dataset.row);
        const c = Number(e.currentTarget.dataset.col);
        if (dragFrom.trashIndex !== undefined) {
          const moving = trash[dragFrom.trashIndex];
          const target = work[r][c];
          work[r][c] = moving;
          if (target) trash[dragFrom.trashIndex] = target; else trash.splice(dragFrom.trashIndex, 1);
          dragFrom = null;
          coachText.textContent = "Пачка из корзины поставлена в шкаф.";
          repaint();
          checkFinish();
          return;
        }
        const { row, col } = dragFrom;
        if (row === r && col === c) return;
        const a = work[row][col];
        const b = work[r][c];
        work[row][col] = b;
        work[r][c] = a;
        if (a !== baseRef[r][c]) errs++;
        dragFrom = null;
        repaint();
        checkFinish();
      }

      function onDropToBasket(e) {
        e.preventDefault();
        basket.classList.remove("over");
        if (!started || !dragFrom) return;
        if (dragFrom.trashIndex !== undefined) return;
        const item = work[dragFrom.row][dragFrom.col];
        if (!item) return;
        work[dragFrom.row][dragFrom.col] = null;
        trash.push(item);
        dragFrom = null;
        errs++;
        coachText.textContent = "Пачка отправлена в корзину.";
        repaint();
      }

      function metrics() {
        let ok = 0, total = rows * cols;
        for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) if (work[r][c] === baseRef[r][c] && work[r][c] !== null) ok++;
        return { ok, total };
      }

      function score() {
        const overtime = Math.max(0, sec - 180);
        return Math.max(0, 100 - errs * 5 - hints * 10 - Math.floor(overtime / 5));
      }

      function repaint() {
        renderShelf(refShelf, baseRef, false);
        renderShelf(workShelf, work, true);
        renderBasket();
        const m = metrics();
        timeEl.textContent = String(sec);
        errEl.textContent = String(errs);
        hintEl.textContent = String(hints);
        progEl.textContent = `${Math.round((m.ok / m.total) * 100)}%`;
        scoreEl.textContent = String(score());
      }

      function checkFinish() {
        const m = metrics();
        if (m.ok !== m.total || trash.length) return;
        clearInterval(timer);
        started = false;
        const s = score();
        resultText.textContent = `Готово! Балл: ${s}. Время: ${sec} c. Ошибки: ${errs}.`;
        coachText.textContent = "Отличная работа!";
      }

      function resetGame() {
        clearInterval(timer);
        started = false;
        sec = 0; errs = 0; hints = 0;
        work = JSON.parse(JSON.stringify(baseStart));
        trash = [];
        resultText.textContent = "Уровень сброшен. Нажмите «Старт».";
        coachText.textContent = "Шкаф готов. Перетаскивайте пачки.";
        repaint();
      }

      document.getElementById("startBtn").addEventListener("click", () => {
        if (started) return;
        started = true;
        resultText.textContent = "Игра началась.";
        timer = setInterval(() => { sec++; repaint(); }, 1000);
      });
      document.getElementById("resetBtn").addEventListener("click", resetGame);
      document.getElementById("hintBtn").addEventListener("click", () => {
        if (!started) return;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            if (work[r][c] !== baseRef[r][c]) {
              const target = baseRef[r][c];
              if (target === null) continue;
              let tr = -1, tc = -1;
              for (let rr = 0; rr < rows; rr++) {
                for (let cc = 0; cc < cols; cc++) if (work[rr][cc] === target) { tr = rr; tc = cc; break; }
                if (tr !== -1) break;
              }
              if (tr !== -1) {
                const t = work[r][c]; work[r][c] = work[tr][tc]; work[tr][tc] = t;
                hints++;
                coachText.textContent = "Подсказка помогла найти правильную позицию.";
                repaint();
                checkFinish();
                return;
              }
            }
          }
        }
      });
      basket.addEventListener("dragover", (e) => { e.preventDefault(); basket.classList.add("over"); });
      basket.addEventListener("dragleave", () => basket.classList.remove("over"));
      basket.addEventListener("drop", onDropToBasket);

      randomizePackImages();
      repaint();
    </script>
  </body>
</html>
